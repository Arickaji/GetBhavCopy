name: CI (Tests + Lint)

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main, staging ]

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project + dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov ruff

      - name: Code quality check - Lint (ruff)
        run: ruff check .

      - name: Run tests with coverage
        run: pytest --cov=getbhavcopy --cov-report=term
